spring:
  datasource:
    url: jdbc:h2:mem:explore-ai-test;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  liquibase:
    enabled: false
  ai:
    openai:
      api-key: test-key
      base-url: https://api.deepseek.com

app:
  modules:
    vision: false
    audio-asr: false
    mcp: false
    eval: true
  vision:
    enabled: false
