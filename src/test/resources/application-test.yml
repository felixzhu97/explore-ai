spring:
  datasource:
    url: ${TESTCONTAINERS_JDBC_URL}
    username: ${TESTCONTAINERS_USERNAME}
    password: ${TESTCONTAINERS_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: false
  ai:
    openai:
      api-key: test-key
      base-url: https://api.deepseek.com
