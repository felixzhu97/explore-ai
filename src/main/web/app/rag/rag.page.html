<!-- Top Bar with Document Selector -->
<div class="flex shrink-0 items-center justify-between border-b border-black/8 bg-white px-4 py-2.5">
    <div class="flex items-center gap-2">
        <h2 class="text-base font-semibold text-text">{{ i18n.t().ragChat.title }}</h2>
        <z-badge zType="secondary">
            {{ ragService.availableDocs().length }} {{ i18n.t().ragChat.documents }}
        </z-badge>
    </div>
    <div class="flex items-center gap-2">
        <button
                type="button"
                z-button
                zType="ghost"
                zSize="icon"
                (click)="ragService.selectAllDocs()"
                title="Select All"
                aria-label="Select All"
        >
            <ng-icon name="lucideListChecks" class="size-4!" />
        </button>
        <button
                type="button"
                z-button
                zType="ghost"
                zSize="icon"
                (click)="ragService.clearDocSelection()"
                title="Clear Selection"
                aria-label="Clear Selection"
        >
            <ng-icon name="lucideX" class="size-4!" />
        </button>
    </div>
</div>

<app-chat-message-pane
        [messages]="bubbleMessages()"
        [streamingMessageIds]="ragService.streamingMessageIds()"
        [thinkingLabel]="i18n.t().chat.thinking"
        [footerLabels]="footerLabels()"
        [welcomeTitle]="i18n.t().ragChat.title"
        [welcomeDescription]="i18n.t().ragChat.askQuestion"
        [promptsTitle]="i18n.t().chat.suggestedPromptsTitle"
        [prompts]="ragPrompts()"
        (promptSelect)="onPromptSelect($event)"
        (toggleSources)="onToggleSources($event)"
/>

<app-chat-sender-bar
        [placeholder]="i18n.t().ragChat.inputPlaceholder"
        [(value)]="ragService.input"
        [loading]="ragService.isLoading()"
        (submitSend)="ragService.sendMessage()"
>
    @if (ragService.pendingImages().length > 0) {
        <div chatSenderPrelude class="mb-2 flex flex-wrap gap-2">
            @for (img of ragService.pendingImages(); track $index) {
                <div class="group relative">
                    <img [src]="img" alt="Pending image" class="size-16 rounded-lg object-cover" />
                    <button
                            type="button"
                            z-button
                            zType="destructive"
                            zSize="icon"
                            zShape="circle"
                            class="absolute -top-1.5 -right-1.5 size-5 opacity-0 transition-opacity group-hover:opacity-100"
                            (click)="removeImage($index)"
                            title="Remove image"
                            aria-label="Remove image"
                    >
                        <ng-icon name="lucideX" class="size-3!" />
                    </button>
                </div>
            }
        </div>
    }
    <label chatSenderActions class="cursor-pointer">
        <input
                #imageInput
                type="file"
                accept="image/*"
                multiple
                class="hidden"
                (change)="onImageSelect($event)"
        />
        <button
                type="button"
                z-button
                zType="ghost"
                zSize="icon"
                title="Add image"
                aria-label="Add image"
                (click)="imageInput.click()"
        >
            <ng-icon name="lucideImage" class="size-5!" />
        </button>
    </label>
</app-chat-sender-bar>
