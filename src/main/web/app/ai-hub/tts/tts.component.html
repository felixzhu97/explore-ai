<div class="flex flex-col gap-4">
  <z-card
    class="gap-4 py-4 shadow-card"
    [zTitle]="i18n.t().generate.tts.title"
    [zDescription]="i18n.t().generate.tts.description"
  >
    <div class="flex flex-col gap-4">
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium text-muted-foreground" for="tts-text-input">
          {{ i18n.t().generate.tts.textLabel }}
        </label>
        <textarea
          id="tts-text-input"
          z-input
          class="min-h-20 resize-y"
          [ngModel]="text()"
          (ngModelChange)="setText($event)"
          [placeholder]="i18n.t().generate.tts.textPlaceholder"
          rows="4"
        ></textarea>
      </div>

      <div class="flex flex-wrap items-end gap-6 max-md:flex-col">
        <div class="flex min-w-48 flex-col gap-1.5">
          <label class="text-sm font-medium text-muted-foreground" for="voice-select">
            {{ i18n.t().generate.tts.voiceLabel }}
          </label>
          <z-select
            id="voice-select"
            [ngModel]="voice()"
            (ngModelChange)="setVoice($event)"
            [zPlaceholder]="i18n.t().generate.tts.voiceLabel"
          >
            @for (v of availableVoices(); track v.id) {
              <z-select-item [zValue]="v.id">{{ v.name }} ({{ v.language }})</z-select-item>
            } @empty {
              <z-select-item zValue="en-US">English (US)</z-select-item>
              <z-select-item zValue="en-GB">English (UK)</z-select-item>
              <z-select-item zValue="zh-CN">中文</z-select-item>
              <z-select-item zValue="ja-JP">日本語</z-select-item>
            }
          </z-select>
        </div>

        <div class="flex min-w-36 flex-1 flex-col gap-2">
          <label class="text-sm font-medium text-muted-foreground" for="speed-slider">
            {{ i18n.t().generate.tts.speedLabel }}: {{ speed().toFixed(1) }}x
          </label>
          <z-slider
            id="speed-slider"
            [zMin]="0.5"
            [zMax]="2"
            [zStep]="0.1"
            [ngModel]="speed()"
            (ngModelChange)="setSpeed($event)"
          />
        </div>
      </div>

      <button
        type="button"
        z-button
        zFull
        zSize="lg"
        [zLoading]="isSynthesizing()"
        [zDisabled]="!text().trim() || isSynthesizing()"
        (click)="synthesize()"
      >
        @if (isSynthesizing()) {
          {{ i18n.t().generate.tts.synthesizing }}
        } @else {
          {{ i18n.t().generate.tts.synthesizeButton }}
        }
      </button>

      @if (error()) {
        <z-alert zType="destructive" [zDescription]="error()!" />
      }

      @if (audioUrl()) {
        <div class="flex flex-col gap-3 rounded-xl border border-border bg-muted/40 p-4">
          <div class="flex items-center gap-4">
            <button
              type="button"
              z-button
              zSize="icon"
              (click)="togglePlayPause()"
              [attr.aria-label]="isPlaying() ? 'Pause' : 'Play'"
            >
              <ng-icon [name]="isPlaying() ? 'lucidePause' : 'lucidePlay'" class="size-5!" />
            </button>
            <div class="flex flex-1 flex-col gap-2">
              <span class="text-base font-medium text-foreground">{{ i18n.t().generate.tts.audioReady }}</span>
              <z-progress-bar [progress]="progress()" />
            </div>
          </div>
          <button type="button" z-button zType="outline" class="w-fit" (click)="download()">
            <ng-icon name="lucideDownload" class="size-4!" />
            {{ i18n.t().generate.tts.downloadAudio }}
          </button>
        </div>
      }
    </div>
  </z-card>
</div>
