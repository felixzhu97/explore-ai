<!-- Top Bar with Model Selector -->
<div class="flex shrink-0 items-center justify-between gap-2 overflow-x-auto border-b border-black/8 bg-white px-4 py-2.5">
    <div class="flex min-w-0 items-center gap-2">
        <z-select
                class="min-w-32"
                zSize="sm"
                [ngModel]="chat.selectedProvider()"
                (ngModelChange)="onProviderChange($event)"
        >
            @for (provider of chat.providers(); track provider.name) {
                <z-select-item [zValue]="provider.name">{{ provider.displayName }}</z-select-item>
            }
        </z-select>

        <z-select
                class="min-w-28"
                zSize="sm"
                [ngModel]="chat.selectedModel()"
                (ngModelChange)="setSelectedModel($event)"
                [zDisabled]="chat.isLoadingModels()"
                zPlaceholder="Model"
        >
            @if (chat.isLoadingModels()) {
                <z-select-item zValue="" [zDisabled]="true">Loading...</z-select-item>
            } @else {
                @for (model of chat.models(); track model.name) {
                    <z-select-item [zValue]="model.name">{{ model.name }}</z-select-item>
                }
            }
        </z-select>

        <div class="hidden shrink-0 items-center sm:flex">
            <z-switch
                    [ngModel]="chat.toolsEnabled()"
                    (ngModelChange)="chat.setToolsEnabled($event)"
            >
                Tools
            </z-switch>
        </div>
    </div>

    <button
            type="button"
            z-button
            zType="ghost"
            zSize="icon"
            (click)="newChat()"
            title="New Chat"
            aria-label="New Chat"
    >
        <ng-icon name="lucideRefreshCw" class="size-4!" />
    </button>
</div>

<!-- Messages -->
<div #messageScroll class="flex-1 overflow-y-auto bg-surface px-4 py-3 max-md:pt-2 md:py-6">
    @if (chat.messages().length === 0) {
        <app-chat-welcome-panel
                class="h-full"
                [title]="i18n.t().chat.welcomeTitle"
                [description]="i18n.t().chat.welcomeDescription"
                [promptsTitle]="i18n.t().chat.suggestedPromptsTitle"
                [prompts]="chatPrompts()"
                (promptSelect)="onPromptSelect($event)"
        />
    } @else {
        <app-chat-bubble-list
                [messages]="bubbleMessages()"
                [streamingMessageId]="chat.streamingMessageId()"
                [thinkingLabel]="i18n.t().chat.thinking"
        />
    }
</div>

<!-- Error -->
@if (chat.error()) {
    <z-alert
            class="rounded-none border-x-0 border-t"
            zType="destructive"
            [zDescription]="chat.error()!"
    />
}

<!-- Input -->
<div class="border-t border-black/8 bg-white px-4 py-3 pb-[max(0.75rem,env(safe-area-inset-bottom))]">
    <div>
        <nx-sender
            [placeholder]="i18n.t().chat.inputPlaceholder"
            [(value)]="input"
            [loading]="chat.isLoading()"
            (submitSend)="send()"
        />
    </div>
</div>
