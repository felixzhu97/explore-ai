<!-- Top Bar with Model Selector -->
<div class="flex shrink-0 items-center justify-between gap-2 overflow-x-auto border-b border-black/8 bg-white px-4 py-2.5">
    <div class="flex min-w-0 items-center gap-2">
        <select
                class="
          cursor-pointer rounded-lg border border-border-light bg-surface px-3 py-1.5
          text-sm font-medium text-text focus:border-primary focus:outline-none
          disabled:cursor-not-allowed disabled:opacity-50
        "
                [ngModel]="chat.selectedProvider()"
                (ngModelChange)="onProviderChange($event)"
        >
            @for (provider of chat.providers(); track provider.name) {
                <option [value]="provider.name">
                    {{ provider.displayName }}
                </option>
            }
        </select>

        <select
                class="
          min-w-28 cursor-pointer rounded-lg border border-border-light bg-surface px-3 py-1.5
          text-sm text-text focus:border-primary focus:outline-none
          disabled:cursor-not-allowed disabled:opacity-50
        "
                [ngModel]="chat.selectedModel()"
                (ngModelChange)="setSelectedModel($event)"
                [disabled]="chat.isLoadingModels()"
        >
            @if (chat.isLoadingModels()) {
                <option>Loading...</option>
            } @else {
                @for (model of chat.models(); track model.name) {
                    <option [value]="model.name">{{ model.name }}</option>
                }
            }
        </select>

        <label class="hidden shrink-0 cursor-pointer items-center gap-2 rounded-lg border border-border-light px-3 py-1.5 text-sm text-text sm:flex">
            <input
                    type="checkbox"
                    class="size-4 accent-primary"
                    [checked]="chat.toolsEnabled()"
                    (change)="chat.setToolsEnabled($any($event.target).checked)"
            />
            Tools
        </label>
    </div>

    <button
            type="button"
            class="
        flex cursor-pointer items-center justify-center rounded-lg border-none bg-transparent
        p-1.5 text-text-secondary transition-colors
        hover:bg-surface-secondary hover:text-text
      "
            (click)="newChat()"
            title="New Chat"
    >
        <svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
        </svg>
    </button>
</div>

<!-- Messages -->
<div class="flex-1 overflow-y-auto bg-surface px-4 py-3 max-md:pt-2 md:py-6">
    @if (chat.messages().length === 0) {
        <app-chat-empty-state [message]="i18n.t().agents.startConversation" />
    } @else {
        <div class="space-y-6">
            @for (msg of chat.messages(); track msg.id) {
                @if (msg.role === 'user') {
                    <app-chat-user-message [content]="msg.content" />
                } @else {
                    <app-chat-assistant-message
                        [content]="msg.content"
                        [timestamp]="msg.timestamp"
                        [streaming]="chat.streamingMessageId() === msg.id"
                        [thinkingLabel]="i18n.t().chat.thinking"
                    />
                }
            }
            <div #messagesEnd></div>
        </div>
    }
</div>

<!-- Error -->
@if (chat.error()) {
    <div class="animate-fade-in border-t border-red-200 bg-error-light px-4 py-2 text-base text-error">
        {{ chat.error() }}
    </div>
}

<!-- Input -->
<div class="border-t border-black/8 bg-white px-4 py-3 pb-[max(0.75rem,env(safe-area-inset-bottom))]">
    <div>
        <nx-sender
            [placeholder]="i18n.t().chat.inputPlaceholder"
            [(value)]="input"
            [loading]="chat.isLoading()"
            (submitSend)="send()"
        />
    </div>
</div>
