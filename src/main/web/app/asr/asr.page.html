<div class="flex min-h-0 flex-1 flex-col overflow-hidden">
  <div
    class="flex shrink-0 flex-wrap items-center justify-between gap-3 border-b border-black/8 bg-white px-4 py-3"
  >
    <div class="min-w-0">
      <h1 class="text-base font-semibold text-foreground">Speech to Text</h1>
      <p class="text-xs text-foreground/60">
        Connection:
        <span class="capitalize text-foreground">{{ asr.connectionState() }}</span>
      </p>
    </div>
    <div class="flex flex-wrap items-center gap-2">
      <button type="button" z-button zType="default" (click)="connect()">Connect</button>
      <button type="button" z-button zType="outline" (click)="disconnect()">Disconnect</button>
      <button type="button" z-button zType="ghost" zSize="sm" (click)="sendStop()">Stop</button>
      <button
        type="button"
        z-button
        zType="ghost"
        zSize="sm"
        class="text-foreground/50"
        (click)="sendTestPayload()"
      >
        Test payload
      </button>
    </div>
  </div>

  @if (asr.error()) {
    <p class="shrink-0 border-b border-red-200 bg-red-50 px-4 py-2 text-sm text-red-700">
      {{ asr.error() }}
    </p>
  }

  <div class="min-h-0 flex-1 overflow-y-auto bg-surface px-4 py-6">
    <div class="mx-auto flex min-h-full max-w-3xl flex-col gap-4">
      <section class="flex min-h-64 flex-1 flex-col rounded-xl border border-black/8 bg-white p-5">
        <h2 class="text-xs font-medium tracking-wide text-foreground/50 uppercase">Transcript</h2>
        <p class="mt-4 flex-1 text-base leading-relaxed whitespace-pre-wrap text-foreground">
          {{ asr.transcript() || 'Connect to start live transcription.' }}
        </p>
      </section>

      @if (asr.lastMessage()) {
        <details class="rounded-lg border border-black/8 bg-white px-4 py-3 text-xs text-foreground/70">
          <summary class="cursor-pointer select-none font-medium text-foreground/60">
            Last server message
          </summary>
          <pre class="mt-2 overflow-x-auto whitespace-pre-wrap">{{ asr.lastMessage() }}</pre>
        </details>
      }
    </div>
  </div>
</div>
