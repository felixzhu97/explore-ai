<div class="flex flex-col gap-6" [style.animation]="'fadeIn 0.3s ease'">
  <div class="
    relative flex max-h-96 min-h-48 flex-col gap-4 overflow-y-auto
    rounded-xl bg-surface p-4
  ">
    @if (messages().length === 0) {
      <div class="
        flex flex-col items-center justify-center gap-2 px-6 py-12 text-center
        text-text-secondary
      ">
        <div class="opacity-50">
          <svg
            width="48"
            height="48"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
          >
            <path
              d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"
            />
            <circle cx="8.5" cy="14.5" r="1.5" />
            <circle cx="15.5" cy="14.5" r="1.5" />
          </svg>
        </div>
        <p>{{ startConversationText() }}</p>
        @if (quickPrompts().length > 0) {
          <div class="mt-2 flex flex-wrap justify-center gap-2">
            @for (prompt of quickPrompts().slice(0, 3); track $index) {
              <button
                type="button"
                class="
                  cursor-pointer rounded-full border border-border
                  bg-surface px-3 py-1 text-xs text-primary transition-all
                  duration-150
                  hover:bg-primary-light
                "
                (click)="setInput(prompt)"
              >
                {{ prompt }}
              </button>
            }
          </div>
        }
      </div>
    } @else {
      <div class="flex flex-col gap-4">
        @for (msg of messages(); track msg.id) {
          <app-chat-message [message]="msg" />
        }
        @if (isLoading()) {
          <div class="flex items-center gap-2 p-2 text-xs text-text-secondary">
            <span
              class="
                inline-block size-4 rounded-full border-2 border-current
                border-r-transparent
              "
              [style.animation]="'spin 0.6s linear infinite'"
            ></span>
            <span>{{ thinkingText() }}</span>
          </div>
        }
        <div #messagesEnd></div>
      </div>
    }
  </div>

  <nx-sender
    [placeholder]="inputPlaceholderText()"
    [(value)]="inputValue"
    [loading]="isLoading()"
    (submitSend)="sendMessage()"
  />
</div>
