<div
  #splitHost
  class="flex min-h-0 flex-1 overflow-hidden"
  [class.select-none]="isDraggingSplitter()"
>
  <div class="flex min-h-0 min-w-0 flex-1 flex-col overflow-hidden">
    <app-agents-pipeline-canvas
      class="min-h-0 flex-1"
      [agents]="agents()"
      [validationHint]="pipelineHint()"
      (runRequested)="runPipeline($event)"
      (graphChange)="onGraphChange($event)"
      (clearValidation)="pipelineHint.set(null)"
      (templateHint)="onTemplateHint($event)"
      (templateApplied)="onTemplateApplied($event)"
    />
  </div>

  @if (!resultsCollapsed()) {
    <div
      class="group relative z-10 w-1.5 shrink-0 cursor-col-resize bg-black/6 hover:bg-black/15"
      role="separator"
      aria-orientation="vertical"
      (pointerdown)="onSplitterPointerDown($event)"
    >
      <div
        class="pointer-events-none absolute inset-y-0 -left-1 -right-1"
      ></div>
    </div>
  }

  <aside
    class="flex min-h-0 flex-col border-l border-black/8 bg-white"
    [style.width]="resultsCollapsed() ? '40px' : `${resultsRatio() * 100}%`"
    [style.flex]="'none'"
  >
    @if (resultsCollapsed()) {
      <button
        type="button"
        class="flex h-full w-full flex-col items-center justify-center gap-2 px-1 py-3 text-xs text-text-secondary hover:bg-black/4"
        (click)="toggleResultsCollapsed()"
        [attr.aria-label]="i18n.t().agents.results.expand"
      >
        <span style="writing-mode: vertical-rl" class="tracking-wide">
          {{ i18n.t().agents.results.expand }}
        </span>
      </button>
    } @else {
      <div
        class="flex shrink-0 items-center justify-between gap-2 border-b border-black/8 px-3 py-2"
      >
        <p class="text-xs font-medium text-text-secondary">
          {{ i18n.t().agents.results.title }}
        </p>
        <button
          type="button"
          class="rounded-md px-2 py-1 text-xs text-text-secondary hover:bg-black/4"
          (click)="toggleResultsCollapsed()"
        >
          {{ i18n.t().agents.results.collapse }}
        </button>
      </div>
      <div class="min-h-0 flex-1 overflow-y-auto px-3 py-3">
        @if (messages().length === 0) {
          <p class="text-xs text-text-secondary">
            {{ i18n.t().agents.results.empty }}
          </p>
        } @else {
          <app-chat-bubble-list
            [messages]="messages()"
            [streamingMessageId]="streamingMessageId()"
            [thinkingLabel]="i18n.t().agents.thinking"
            [collapseLongUserMessages]="true"
            [expandLabel]="i18n.t().agents.results.expandMessage"
            [collapseLabel]="i18n.t().agents.results.collapseMessage"
            toolStepDoneLabel="完成"
            toolStepFailedLabel="失败"
          />
        }
      </div>
    }
  </aside>
</div>

@if (error()) {
  <z-alert
    class="rounded-none border-x-0 border-t"
    zType="destructive"
    [zDescription]="error()!"
  />
}

<div class="border-t border-black/8 bg-white px-4 py-3 pb-[max(0.75rem,env(safe-area-inset-bottom))]">
  <nx-sender
    [placeholder]="i18n.t().agents.pipeline.inputPlaceholder"
    [(value)]="input"
    [loading]="loading()"
    (submitSend)="send()"
  />
</div>
