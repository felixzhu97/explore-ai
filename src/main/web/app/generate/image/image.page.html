<div class="grid min-w-0 grid-cols-1 gap-6 md:grid-cols-[minmax(0,1fr)_minmax(0,1.35fr)]">
  <app-image-gen-form
    [title]="i18n.t().generate.image.title"
    [description]="i18n.t().generate.image.description"
    [promptLabel]="i18n.t().generate.image.promptLabel"
    [promptPlaceholder]="i18n.t().generate.image.promptPlaceholder"
    [sizeLabel]="i18n.t().generate.image.sizeLabel"
    [generateLabel]="i18n.t().generate.image.generateButton"
    [generatingLabel]="i18n.t().generate.image.generating"
    [prompt]="imageGen.prompt()"
    [sizes]="imageGen.sizes()"
    [selectedSize]="imageGen.selectedSize()"
    [generating]="imageGen.isGenerating()"
    (promptChange)="imageGen.setPrompt($event)"
    (sizeSelected)="imageGen.setSize($event)"
    (generateRequested)="imageGen.generate()"
  />

  <div class="flex min-h-0 flex-col gap-3">
    <app-media-preview-panel
      class="min-h-0 flex-1"
      [imageSrc]="imageGen.generatedImage()"
      [loading]="imageGen.isGenerating()"
      [loadingLabel]="i18n.t().generate.image.generating"
      [emptyState]="i18n.t().generate.image.emptyState"
      [zoomLabel]="i18n.t().generate.image.zoomLabel"
      (zoomRequested)="imageGen.openZoom()"
    >
      @if (imageGen.hasGeneratedImage()) {
        <div previewActions class="flex justify-center border-t border-black/8 pt-3">
          <button type="button" z-button zType="outline" (click)="imageGen.download()">
            {{ i18n.t().generate.image.download }}
          </button>
        </div>
      }
    </app-media-preview-panel>

    @if (imageGen.error()) {
      <z-alert zType="destructive" [zDescription]="imageGen.error()!" />
    }
  </div>
</div>
