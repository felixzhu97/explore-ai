<div class="flex shrink-0 items-center justify-center border-b border-black/8 bg-white px-4 py-2.5">
  <z-segmented
    [zOptions]="taskOptions()"
    [ngModel]="vision.activeTask()"
    (ngModelChange)="vision.setActiveTask($event)"
  />
</div>

<div class="min-h-0 flex-1 overflow-y-auto bg-surface px-4 py-6">
  <div class="grid min-h-72 grid-cols-1 gap-6 md:grid-cols-2">
    <app-media-upload-panel
      [title]="i18n.t().imageUploader.imageLabel"
      [imagePreview]="vision.currentState().image"
      [loading]="vision.isLoading()"
      [dropText]="i18n.t().imageUploader.dropText"
      [dropHint]="i18n.t().imageUploader.dropHint"
      [clearLabel]="i18n.t().imageUploader.clearImage"
      [clickToEnlargeLabel]="i18n.t().imageUploader.clickToEnlarge"
      [showDetectionOverlay]="vision.activeTask() === 'detect'"
      [detections]="vision.currentState().result?.detections"
      (fileSelected)="vision.processFile($event)"
      (cleared)="vision.clearImage()"
      (zoomRequested)="vision.openZoom($event)"
    />

    <app-media-result-panel
      [title]="i18n.t().imageUploader.resultLabel"
      [task]="vision.activeTask()"
      [result]="vision.currentState().result"
      [error]="vision.currentState().error"
      [loading]="vision.isLoading()"
      [canAnalyze]="vision.canAnalyze()"
      [emptyLabel]="i18n.t().imageUploader.noImageYet"
      [noDetectionsLabel]="i18n.t().imageUploader.noDetections"
      [analyzeLabel]="i18n.t().imageUploader.startAnalyze"
      [analyzingLabel]="i18n.t().imageUploader.analyzing"
      [processingTimeLabel]="vision.processingTimeLabel()"
      (analyzeRequested)="vision.analyze()"
    />
  </div>
</div>
