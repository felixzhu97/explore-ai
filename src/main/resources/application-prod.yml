server:
  port: ${PORT:8080}

# Railway / cloud-minimal profile: optional local-only modules are disabled.
spring:
  ai:
    mcp:
      server:
        enabled: false
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never
    ollama:
      chat:
        enabled: false

app:
  modules:
    vision: false
    audio-asr: false
    mcp: false
    eval: false
  vision:
    enabled: false
  ai:
    image:
      provider: ${IMAGE_PROVIDER:openai}
      model: ${IMAGE_MODEL:dall-e-3}
      api-key: ${IMAGE_API_KEY:${OPENAI_API_KEY:}}
      base-url: ${IMAGE_BASE_URL:https://api.openai.com/v1}
    tts:
      api-key: ${TTS_API_KEY:${OPENAI_API_KEY:}}

logging:
  level:
    com.ai: INFO
    org.springframework.ai: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
