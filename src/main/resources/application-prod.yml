server:
  port: ${PORT:8080}

# Railway / cloud-minimal profile: optional local-only modules are disabled.
spring:
  ai:
    mcp:
      server:
        enabled: false
      client:
        # Prod: no STDIO MCP (Fetch requires local uvx); lifestyle web search still works
        stdio:
          enabled: false
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never
    ollama:
      chat:
        enabled: false

launchdarkly:
  enabled: ${LAUNCHDARKLY_ENABLED:true}
  sdk-key: ${LAUNCHDARKLY_SDK_KEY:}
  fallback:
    module-vision: false
    module-audio-asr: false
    module-mcp: false
    module-eval: false

app:
  vision:
    models-dir: ${VISION_MODELS_DIR:models}
  ai:
    image:
      provider: ${IMAGE_PROVIDER:openai}
      model: ${IMAGE_MODEL:dall-e-3}
      api-key: ${IMAGE_API_KEY:${OPENAI_API_KEY:}}
      base-url: ${IMAGE_BASE_URL:https://api.openai.com/v1}
    tts:
      api-key: ${TTS_API_KEY:${OPENAI_API_KEY:}}

logging:
  level:
    com.ai: INFO
    org.springframework.ai: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
