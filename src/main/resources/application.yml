spring:
  application:
    name: server-springai
  ai:
    mcp:
      server:
        type: SYNC
        stdio: false
        protocol: STREAMABLE
        name: explore-ai-mcp-server
        version: "1.0.0"
        description: AI Explore MCP Server with RAG, Weather, and Chat tools
        annotation-scanner:
          enabled: true
      client:
        enabled: true
        type: SYNC
        toolcallback:
          enabled: true
    ollama:
      base-url: http://localhost:11434
      chat:
        enabled: ${OLLAMA_VISION_ENABLED:true}
        model: ${OLLAMA_VISION_MODEL:qwen3.5:35b}
      embedding:
        enabled: true
        model: ${OLLAMA_EMBEDDING_MODEL:mxbai-embed-large}
        dimensions: 1024
    openai:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: ${DEEPSEEK_BASE_URL}
      chat:
        model: deepseek-v4-flash
      image:
        model: dall-e-3
        quality: standard
        size: 1024x1024
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-3-5-sonnet-20241022
    rag:
      chunk:
        size: ${RAG_CHUNK_SIZE:500}
        overlap: ${RAG_CHUNK_OVERLAP:50}
      retrieval:
        top-k: ${RAG_TOP_K:5}
        score-threshold: ${RAG_SCORE_THRESHOLD:0.5}

  datasource:
    url: ${H2_URL:jdbc:h2:file:./data/explore-ai;AUTO_SERVER=TRUE}
    username: ${H2_USER:sa}
    password: ${H2_PASSWORD:}
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false

  liquibase:
    change-log: db/changelog-master.xml

  autoconfigure:
    exclude:
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 9000
  tomcat:
    max-http-form-post-size: 50MB
    max-swallow-size: 50MB

serper:
  api-key: ${SERPER_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0

launchdarkly:
  enabled: ${LAUNCHDARKLY_ENABLED:true}
  sdk-key: ${LAUNCHDARKLY_SDK_KEY:}
  fallback:
    module-vision: true
    module-audio-asr: true
    module-mcp: true
    module-eval: true

app:
  ai:
    image:
      enabled: ${IMAGE_ENABLED:true}
      provider: ${IMAGE_PROVIDER:ollama}
      model: ${IMAGE_MODEL:x/flux2-klein}
      api-key: ${IMAGE_API_KEY:ollama}
      base-url: ${IMAGE_BASE_URL:http://localhost:11434/v1}
    logging-advisor:
      enabled: ${AI_LOGGING_ADVISOR_ENABLED:true}
    tts:
      enabled: ${TTS_ENABLED:true}
      model: ${TTS_MODEL:gpt-4o-mini-tts}
      voice: ${TTS_VOICE:alloy}
      api-key: ${TTS_API_KEY:${OPENAI_API_KEY:}}
      base-url: ${TTS_BASE_URL:https://api.openai.com/v1}
  asr:
    whisper-cpp:
      base-url: http://localhost:8178
      model: whisper-base
      connect-timeout: 5s
      read-timeout: 60s
  cors:
    allowed-origin-patterns:
      - http://localhost:4200
      - http://localhost:3000
      - http://127.0.0.1:4200
      - http://127.0.0.1:4321
      - https://explore-ai-git-*-felixzhu97s-projects.vercel.app
      - https://explore-ai-three.vercel.app
      - https://www.felixzhu.chat
      - https://felixzhu.chat
  vision:
    models-dir: ${VISION_MODELS_DIR:models}
    detect:
      onnx-path: ${VISION_DETECT_MODEL:models/yolov8n.onnx}
      confidence-threshold: 0.5
      nms-threshold: 0.45
      input-size: 640
    caption:
      vision-onnx: ${VISION_CAPTION_VISION_MODEL:models/blip_vision_model.onnx}
      decoder-onnx: ${VISION_CAPTION_DECODER_MODEL:models/blip_text_decoder.onnx}
      tokenizer-path: ${VISION_CAPTION_TOKENIZER:models/blip_tokenizer}
      max-length: 50
    ocr:
      tessdata-path: ${TESSDATA_PATH:models/tessdata}
      languages: eng+chi_sim
      page-seg-mode: 3

logging:
  level:
    com.ai: DEBUG
    org.springframework.ai: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
