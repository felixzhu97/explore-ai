spring:
  application:
    name: server-springai
  ai:
    mcp:
      server:
        type: SYNC
        stdio: false
        protocol: STREAMABLE
        name: ai-explore-mcp-server
        version: "1.0.0"
        description: AI Explore MCP Server with RAG, Weather, and Chat tools
        annotation-scanner:
          enabled: true
    client:
      enabled: true
      type: SYNC
      toolcallback:
        enabled: true
    ollama:
      base-url: http://localhost:11434
    openai:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: ${DEEPSEEK_BASE_URL}
      chat:
        options:
          model: deepseek-v4-flash
      embedding:
        options:
          model: text-embedding-3-small
      image:
        options:
          model: dall-e-3
          quality: standard
          size: 1024x1024
      audio:
        speech:
          options:
            model: gpt-4o-mini-tts
            voice: alloy

  # H2 embedded database (no Docker required)
  datasource:
    url: ${H2_URL:jdbc:h2:file:./data/ai-explore;AUTO_SERVER=TRUE}
    username: ${H2_USER:sa}
    password: ${H2_PASSWORD:}
    driver-class-name: org.h2.Driver

  # JPA: validate schema against Liquibase migrations
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false

  # Liquibase auto-runs on startup
  liquibase:
    change-log: db/changelog-master.xml

# RAG configuration
rag:
  mock:
    embeddings: false
  ollama:
    embedding:
      model: nomic-embed-text
      dimensions: 768
    chat:
      enabled: true
      model: qwen3.5:35b
  chunk:
    size: ${RAG_CHUNK_SIZE:500}
    overlap: ${RAG_CHUNK_OVERLAP:50}
  retrieval:
    top-k: ${RAG_TOP_K:5}
    score-threshold: ${RAG_SCORE_THRESHOLD:0.5}

server:
  port: 9000
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
  tomcat:
    max-http-form-post-size: 50MB
    max-swallow-size: 50MB

# Serper web search configuration
serper:
  api-key: ${SERPER_API_KEY:}

# Actuator for health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.ai: DEBUG
    org.springframework.ai: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
