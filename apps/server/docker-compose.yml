services:
postgres:
image: pgvector/pgvector:pg17
environment:
POSTGRES_DB: ai_rag
POSTGRES_USER: postgres
POSTGRES_PASSWORD: postgres
ports: - "5432:5432"
volumes: - postgres_data:/var/lib/postgresql/data
healthcheck:
test: ["CMD-SHELL", "pg_isready -U postgres"]
interval: 5s
timeout: 5s
retries: 5

volumes:
postgres_data:
