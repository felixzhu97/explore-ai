server:
  port: 9001

spring:
  application:
    name: rag-service

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

# RAG Service Configuration
rag:
  # Qdrant Vector Database
  qdrant:
    host: ${QDRANT_HOST:localhost}
    port: ${QDRANT_PORT:6333}
    collection-name: ${QDRANT_COLLECTION:documents}
    embedding-dimension: ${EMBEDDING_DIMENSION:384}
    api-key: ${QDRANT_API_KEY:}
    timeout-seconds: 30

  # Document Processing
  chunk-size: ${CHUNK_SIZE:500}
  chunk-overlap: ${CHUNK_OVERLAP:50}
  max-file-size-mb: ${MAX_FILE_SIZE_MB:50}

  # LLM Configuration
  llm:
    provider: ${LLM_PROVIDER:openai}
    model-name: ${LLM_MODEL:gpt-4o}
    api-key: ${OPENAI_API_KEY:}
    base-url: ${LLM_BASE_URL:}
    temperature: ${LLM_TEMPERATURE:0.7}
    max-tokens: ${LLM_MAX_TOKENS:2048}

  # Embedding Model
  embedding:
    model-name: ${EMBEDDING_MODEL:sentence-transformers/all-MiniLM-L6-v2}
    dimension: ${EMBEDDING_DIMENSION:384}

# Logging
logging:
  level:
    com.ai.rag: DEBUG
    dev.langchain4j: INFO
    com.qdrant: INFO

---
# Development profile
spring:
  config:
    activate:
      on-profile: dev

rag:
  qdrant:
    host: localhost
  llm:
    provider: openai
    api-key: ${OPENAI_API_KEY:sk-dev-key}

---
# Production profile
spring:
  config:
    activate:
      on-profile: prod

rag:
  qdrant:
    host: qdrant
  llm:
    provider: openai
