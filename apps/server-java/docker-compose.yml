version: '3.8'

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-gateway
    ports:
      - "9000:9000"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - AI_BASE_URL=${AI_BASE_URL:-https://api.deepseek.com}
      - AI_API_KEY=${AI_API_KEY:-your-api-key}
      - AI_MODEL=${AI_MODEL:-deepseek-chat}
    depends_on:
      # Uncomment when services are containerized:
      # - rag-service
      # - tts-service
      # - vision-service
      # - text-service
      # - media-service
    networks:
      - ai-network
    restart: unless-stopped

