server:
  port: 9000

spring:
  application:
    name: gateway

  webflux:
    problemdetails:
      enabled: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

# LangChain4j configuration for OpenAI-compatible APIs
langchain4j:
  chat:
    base-url: ${AI_BASE_URL:https://api.deepseek.com/v1}
    api-key: ${AI_API_KEY:}
    model-name: ${AI_MODEL:deepseek-v4-flash}
    log-requests: true
    log-responses: true
  embedding:
    base-url: ${AI_BASE_URL:https://api.deepseek.com/v1}
    api-key: ${AI_API_KEY:}
    model-name: ${EMBEDDING_MODEL:text-embedding-3-small}

# Qdrant vector database configuration
qdrant:
  enabled: ${QDRANT_ENABLED:true}
  host: ${QDRANT_HOST:localhost}
  port: ${QDRANT_PORT:6333}
  collection: ${QDRANT_COLLECTION:ai_test_docs}
  vector-dimension: ${QDRANT_VECTOR_DIM:1536}
  timeout: ${QDRANT_TIMEOUT:30000}

# Media/Image generation configuration
media:
  stable-diffusion:
    api-url: ${SD_API_URL:http://localhost:9000}
    default-model: stable-diffusion-xl-base-1.0
    available-models:
      - stable-diffusion-xl-base-1.0
      - stable-diffusion-1.5
    default-generation:
      width: 512
      height: 512
      steps: 25
      guidance-scale: 7.5
      num-images: 1
    http:
      connect-timeout: 30s
      read-timeout: 5m
      write-timeout: 5m
  # Local Diffusion (DJL + Python/diffusers) configuration
  local-diffusion:
    # HuggingFace cache path for models
    model-path: ${LOCAL_DIFFUSION_MODEL_PATH:${HOME}/.cache/huggingface/hub}
    # Device: cpu, cuda, or mps (Apple Silicon)
    device: ${LOCAL_DIFFUSION_DEVICE:auto}
    # Default model to use
    default-model: stabilityai/stable-diffusion-2-1
    # Available models list
    available-models:
      - stabilityai/stable-diffusion-2-1
      - stabilityai/stable-diffusion-xl-base-1.0
    # Python executable path
    python-path: ${LOCAL_DIFFUSION_PYTHON:python3}
    # Path to inference script
    script-path: ${LOCAL_DIFFUSION_SCRIPT:scripts/run_diffusion.py}
    # Max memory per inference (GB)
    max-memory-gb: ${LOCAL_DIFFUSION_MAX_MEMORY:4}
    # Number of parallel inference threads
    num-threads: ${LOCAL_DIFFUSION_THREADS:2}
    # Enable xformers memory optimization (requires xformers installed)
    enable-xformers: false

# Agent configuration
ai:
  agent:
    intent-routing:
      enabled: true
    services:
      rag:
        base-url: ${RAG_SERVICE_URL:http://localhost:9000}
        timeout: 30000
      tts:
        base-url: ${TTS_SERVICE_URL:http://localhost:9000}
        timeout: 60000
      vision:
        base-url: ${VISION_SERVICE_URL:http://localhost:9000}
        timeout: 30000
      media:
        base-url: ${MEDIA_SERVICE_URL:http://localhost:9000}
        timeout: 120000
      text:
        base-url: ${TEXT_SERVICE_URL:http://localhost:9000}
        timeout: 30000
