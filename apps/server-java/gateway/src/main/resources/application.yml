server:
  port: 9000

spring:
  application:
    name: gateway

  webflux:
    problemdetails:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

# LangChain4j configuration for OpenAI-compatible APIs
langchain4j:
  open-ai:
    base-url: https://api.deepseek.com/v1
    api-key: ${AI_API_KEY:EMPTY}
    model-name: ${AI_MODEL:deepseek-chat}
    log-requests: true
    log-responses: true

# Media/Image generation configuration
media:
  stable-diffusion:
    api-url: ${SD_API_URL:http://localhost:8015}
    default-model: stable-diffusion-xl-base-1.0
    available-models:
      - stable-diffusion-xl-base-1.0
      - stable-diffusion-1.5
    default-generation:
      width: 512
      height: 512
      steps: 25
      guidance-scale: 7.5
      num-images: 1
    http:
      connect-timeout: 30s
      read-timeout: 5m
      write-timeout: 5m

# Agent configuration
ai:
  agent:
    intent-routing:
      enabled: true
    services:
      rag:
        base-url: ${RAG_SERVICE_URL:http://localhost:9001}
        timeout: 30000
      tts:
        base-url: ${TTS_SERVICE_URL:http://localhost:8013}
        timeout: 60000
      vision:
        base-url: ${VISION_SERVICE_URL:http://localhost:8000}
        timeout: 30000
      media:
        base-url: ${MEDIA_SERVICE_URL:http://localhost:8015}
        timeout: 120000
      text:
        base-url: ${TEXT_SERVICE_URL:http://localhost:8006}
        timeout: 30000
