# TTS Service Docker Configuration
services:
  tts-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8013:8013"
    environment:
      - TTS_PROVIDER=${TTS_PROVIDER:-azure}
      - TTS_AZURE_SPEECH_KEY=${AZURE_SPEECH_KEY}
      - TTS_AZURE_SPEECH_REGION=${AZURE_SPEECH_REGION:-eastus}
      - TTS_GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/gcp-service-account.json
      - TTS_ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - TTS_COQUI_MODEL_PATH=${COQUI_MODEL_PATH:-}
    volumes:
      - ./credentials:/app/credentials:ro
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8013/tts/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
