name: Code Review with Review Dog

on:
  pull_request:
    branches: ["main", "java-angular", "feature/**"]

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Setup web env
        uses: ./.github/actions/setup-web-env
      - name: Install reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: v0.20.3
      - name: Run ESLint with reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm -C apps/web exec eslint "src/**/*.ts" --ext .ts 2>&1 |
            reviewdog -f=eslint -reporter=github-pr-review -level=error

  typescript:
    name: TypeScript Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Setup web env
        uses: ./.github/actions/setup-web-env
      - name: Install reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: v0.20.3
      - name: Run TypeScript check with reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          (pnpm -C apps/web exec tsc --noEmit -p tsconfig.app.json &&
            pnpm -C apps/web exec tsc --noEmit -p tsconfig.spec.json) 2>&1 |
            reviewdog -f=tsc -reporter=github-pr-review -level=error

  prettier:
    name: Code Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup web env
        uses: ./.github/actions/setup-web-env
      - name: Check Prettier formatting
        run: pnpm prettier --check "**/*.{ts,tsx,js,jsx,json,md,yml,yaml}"

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup web env
        uses: ./.github/actions/setup-web-env
      - name: Run tests (Vitest + jsdom)
        run: pnpm --filter web exec vitest run
