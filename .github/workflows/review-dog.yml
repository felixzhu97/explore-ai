name: Code Review with Review Dog

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]

jobs:
  lint:
    name: Lint & Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        id: eslint
        run: |
          pnpm lint 2>&1 || true
        continue-on-error: true

      - name: Run Review Dog for ESLint
        if: always()
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm lint 2>&1 | reviewdog -f=eslint -reporter=github-pr-review -level=error || true

  typescript:
    name: TypeScript Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript Check (Web)
        id: tsc
        run: |
          cd apps/web && npx tsc --noEmit 2>&1 || true
        continue-on-error: true

      - name: Run Review Dog for TypeScript
        if: always()
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd apps/web && npx tsc --noEmit 2>&1 | reviewdog -f=tsc -reporter=github-pr-review -level=error || true

  prettier:
    name: Code Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Prettier formatting
        id: prettier
        run: |
          npx prettier --check "**/*.{ts,tsx,js,jsx,json,css,md,mdc}" 2>&1 || true
        continue-on-error: true

      - name: Run Review Dog for Prettier
        if: always()
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx prettier --check "**/*.{ts,tsx,js,jsx,json,css,md,mdc}" 2>&1 | reviewdog -f=prettier -reporter=github-pr-review -level=warning || true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        id: test
        run: |
          if [ -z "$(find . -name '*.test.ts' -o -name '*.test.tsx' 2>/dev/null)" ]; then
            echo "No test files found, skipping tests"
            exit 0
          fi
          pnpm test --run
        continue-on-error: true
