name: CI

on:
  push:
    branches: [main, java-angular, "feat/**", "feature/**", "fix/**", "refactor/**", "docs/**", "test/**", "chore/**", "perf/**", "ci/**"]
  pull_request:
    branches: [main, java-angular, "feat/**", "feature/**", "fix/**", "refactor/**", "docs/**", "test/**", "chore/**", "perf/**", "ci/**"]

jobs:
  backend:
    name: Backend Test & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      gradle: ${{ steps.gradle.outcome }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - run: chmod +x gradlew

      - id: gradle
        run: ./gradlew test jacocoTestCoverageVerification --no-daemon

      - name: Extract JaCoCo metrics
        if: success()
        run: node scripts/extract-jacoco.mjs

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html
          retention-days: 14
          if-no-files-found: warn

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: success()
        with:
          name: ci-metrics-backend
          path: ci-metrics/
          retention-days: 7
          if-no-files-found: warn

  frontend:
    name: Frontend Test & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      typecheck: ${{ steps.typecheck.outcome }}
      lint: ${{ steps.lint.outcome }}
      test: ${{ steps.test.outcome }}
      build: ${{ steps.build.outcome }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-web-env

      - id: typecheck
        run: pnpm typecheck

      - id: lint
        run: pnpm lint

      - id: test
        run: |
          mkdir -p ci-metrics
          pnpm exec vitest run --reporter=default --reporter=json --outputFile=ci-metrics/vitest.json

      - id: build
        run: pnpm build

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: ci-metrics-frontend
          path: ci-metrics/
          retention-days: 7
          if-no-files-found: warn

  summary:
    name: Summary
    needs: [backend, frontend]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: ci-metrics-*
          merge-multiple: true
          path: ci-metrics

      - name: Write job summary
        env:
          CI_EVENT: ${{ github.event_name }}
          CI_REF: ${{ github.ref_name }}
          CI_SHA: ${{ github.sha }}
          CI_ACTOR: ${{ github.actor }}
          CI_BACKEND: ${{ needs.backend.result }}
          CI_FRONTEND: ${{ needs.frontend.result }}
          CI_GRADLE: ${{ needs.backend.outputs.gradle }}
          CI_TYPECHECK: ${{ needs.frontend.outputs.typecheck }}
          CI_LINT: ${{ needs.frontend.outputs.lint }}
          CI_TEST: ${{ needs.frontend.outputs.test }}
          CI_BUILD: ${{ needs.frontend.outputs.build }}
          CI_METRICS_DIR: ci-metrics
        run: node scripts/write-ci-summary.mjs
